<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도편추방제 — 오스트라키스모스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Serif+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --clay: #EFE0BB;
    --clay-dark: #DFCB9D;
    --paper-line: #C9B27F;
    --terracotta: #BB5A35;
    --terracotta-dark: #8B3D22;
    --terracotta-light: #D98756;
    --ink: #211912;
    --ink-soft: #3A2C20;
    --marble: #17110B;
    --marble-soft: #2B211A;
    --gold: #C9A227;
    --gold-soft: #E4C766;
    --shadow: rgba(33,25,18,0.28);

    --font-display: 'Cinzel', serif;
    --font-body: 'Noto Serif KR', serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse at top, rgba(255,255,255,0.25), transparent 60%),
      var(--clay);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app{
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 20px 64px;
  }

  a{ color: inherit; }

  button{
    font-family: var(--font-body);
    cursor: pointer;
    border: none;
    background: none;
  }
  button:focus-visible, input:focus-visible{
    outline: 3px solid var(--terracotta-dark);
    outline-offset: 2px;
  }

  /* ---------- 장식: 메안더 패턴 ---------- */
  .meander{
    height: 13px;
    width: 100%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='26' height='13' viewBox='0 0 26 13'><path d='M0 13 L0 0 L26 0 L26 4 L7 4 L7 7 L22 7 L22 13 L0 13 Z' fill='%23211912'/></svg>");
    background-repeat: repeat-x;
    background-size: 26px 13px;
    opacity: 0.55;
    margin: 22px 0;
  }
  .meander.light{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='26' height='13' viewBox='0 0 26 13'><path d='M0 13 L0 0 L26 0 L26 4 L7 4 L7 7 L22 7 L22 13 L0 13 Z' fill='%23C9A227'/></svg>");
    opacity: 0.7;
  }

  /* ---------- 헤더 / 히어로 ---------- */
  .hero{
    text-align: center;
    padding-top: 48px;
  }

  .eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--terracotta-dark);
    margin: 0 0 6px;
  }

  .title{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(34px, 7vw, 56px);
    margin: 0;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .title small{
    display: block;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.32em;
    color: var(--terracotta-dark);
    margin-top: 10px;
  }

  .hero-image{
    margin: 30px auto 0;
    max-width: 520px;
    aspect-ratio: 1/1;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 18px 40px var(--shadow);
    border: 1px solid var(--clay-dark);
    background: var(--clay-dark);
  }
  .hero-image img{
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .hero-placeholder{
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
  }

  .tagline{
    max-width: 560px;
    margin: 28px auto 0;
    font-size: 16px;
    color: var(--ink-soft);
  }

  .btn{
    font-weight: 700;
    border-radius: 3px;
    padding: 15px 34px;
    font-size: 16px;
    letter-spacing: 0.02em;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn:active{ transform: translateY(0); }

  .btn-primary{
    background: var(--terracotta);
    color: #FBF1DE;
    box-shadow: 0 8px 20px rgba(139,61,34,0.35);
  }
  .btn-primary:hover{ background: var(--terracotta-dark); }
  .btn-primary:disabled{ opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-secondary{
    background: var(--ink);
    color: var(--clay);
  }
  .btn-secondary:hover{ background: var(--ink-soft); }

  .btn-ghost{
    color: var(--gold-soft);
    border: 1px solid rgba(228,199,102,0.5);
    padding: 11px 26px;
    font-size: 14px;
  }
  .btn-ghost:hover{ background: rgba(228,199,102,0.08); }

  .btn-gold{
    background: var(--gold);
    color: var(--marble);
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
  }
  .btn-gold:hover{ background: var(--gold-soft); }

  .cta-row{ margin-top: 30px; }

  .countdown{
    margin: 16px 0 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-soft);
    opacity: 0.85;
  }

  .results-btn-wrap{
    text-align: center;
    margin-top: 30px;
    min-height: 1px;
  }
  .results-pill{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--gold-soft);
    padding: 14px 28px;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 0.02em;
    box-shadow: 0 10px 26px var(--shadow);
    animation: glow 2.4s ease-in-out infinite;
  }
  @keyframes glow{
    0%,100%{ box-shadow: 0 10px 26px var(--shadow); }
    50%{ box-shadow: 0 10px 30px rgba(201,162,39,0.35); }
  }

  .status-message{
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-soft);
    background: rgba(255,255,255,0.35);
    border: 1px dashed var(--paper-line);
    padding: 12px 24px;
    border-radius: 999px;
    opacity: 0.9;
  }

  /* ---------- 메인 그리드 ---------- */
  .main-grid{
    display: grid;
    grid-template-columns: 1.3fr 0.9fr;
    gap: 40px;
    margin-top: 56px;
    align-items: start;
  }
  @media (max-width: 860px){
    .main-grid{ grid-template-columns: 1fr; gap: 36px; }
  }

  .voting-area.hidden{ display:none; }

  .vote-card{
    background: rgba(255,255,255,0.18);
    border: 1px solid var(--clay-dark);
    border-radius: 6px;
    padding: 30px;
  }

  .vote-card label{
    display:block;
    font-size: 13px;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }

  .field-block + .field-block{ margin-top: 18px; }

  .field-hint{
    margin: 6px 2px 0;
    font-size: 12px;
    color: var(--ink-soft);
    opacity: 0.75;
  }

  .vote-card input[type="text"]{
    width: 100%;
    padding: 14px 16px;
    font-size: 17px;
    font-family: var(--font-body);
    border: 2px solid var(--clay-dark);
    border-radius: 4px;
    background: rgba(255,255,255,0.55);
    color: var(--ink);
  }
  .vote-card input[type="text"]:disabled{ opacity: 0.6; }

  .vote-card .btn{ margin-top: 22px; width: 100%; }

  /* ---------- 도자기 파편 ---------- */
  .shard-wrap{
    margin-top: 26px;
    text-align: center;
  }
  .shard-wrap.hidden{ display:none; }

  .shard{
    width: 92%;
    max-width: 320px;
    min-height: 130px;
    margin: 0 auto;
    padding: 26px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.18), transparent 55%),
      linear-gradient(155deg, var(--terracotta-light), var(--terracotta) 55%, var(--terracotta-dark));
    clip-path: polygon(8% 2%, 55% 0%, 92% 8%, 100% 42%, 88% 78%, 96% 96%, 60% 100%, 18% 92%, 0% 58%, 4% 22%);
    box-shadow: 0 14px 30px var(--shadow);
    position: relative;
    transition: transform 0.7s cubic-bezier(.55,0,.65,1), opacity 0.65s ease;
  }
  .shard::after{
    content:"";
    position:absolute;
    top:8%; left:62%;
    width:1px; height:70%;
    background: rgba(33,25,18,0.22);
    transform: rotate(14deg);
  }
  .shard.dropping{
    transform: translateY(240px) rotate(55deg) scale(0.22);
    opacity: 0;
  }
  .shard-text{
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: 0.04em;
    word-break: keep-all;
    display: block;
  }
  .shard-text span{
    display: inline-block;
    opacity: 0;
    animation: chisel 0.4s ease forwards;
  }
  .shard-reason{
    display: block;
    margin-top: 10px;
    font-size: 13px;
    font-style: italic;
    color: rgba(33,25,18,0.65);
    word-break: keep-all;
  }
  .shard-reason.hidden{ display:none; }
  @keyframes chisel{
    from{ opacity:0; transform: translateY(-7px) scale(0.7) rotate(-7deg); }
    to{ opacity:1; transform: none; }
  }

  .shard-wrap .btn{ margin-top: 22px; }

  /* ---------- 크라테르(바구니) ---------- */
  .krater-wrap{
    margin-top: 34px;
    display: flex;
    justify-content: center;
  }
  .krater-wrap svg{
    width: 130px;
    height: auto;
    transition: transform 0.45s ease;
  }
  .krater-wrap.pulse svg{ transform: scale(1.06); }
  .krater-caption{
    text-align:center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 8px;
    opacity: 0.75;
  }

  /* ---------- 역사 패널(양피지) ---------- */
  .history-panel{
    background:
      repeating-linear-gradient(0deg, transparent 0 30px, rgba(33,25,18,0.05) 30px 31px),
      linear-gradient(170deg, #F1E2BC, #E2CA98);
    border: 1px solid var(--paper-line);
    border-radius: 4px;
    padding: 26px 24px 30px;
    box-shadow: 0 12px 26px var(--shadow), inset 0 0 30px rgba(139,61,34,0.07);
  }
  .history-panel h2{
    font-family: var(--font-display);
    font-size: 19px;
    letter-spacing: 0.04em;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .history-sub{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.8;
    margin: 0 0 4px;
  }
  .meander-mini{
    height: 10px;
    margin: 14px 0 16px;
  }

  .history-list{
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 520px;
    overflow-y: auto;
  }
  .history-empty{
    font-size: 14px;
    color: var(--ink-soft);
    opacity: 0.8;
    padding: 10px 0;
  }
  .history-item{
    padding: 14px 0;
    border-bottom: 1px dashed var(--paper-line);
  }
  .history-item:last-child{ border-bottom: none; }
  .history-date{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--terracotta-dark);
    letter-spacing: 0.04em;
  }
  .history-winner{
    font-weight: 700;
    font-size: 17px;
    margin: 4px 0 2px;
    color: var(--ink);
  }
  .history-count{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
  }

  .footnote{
    text-align: center;
    margin-top: 60px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.6;
  }

  /* ---------- 오버레이(결과 발표) ---------- */
  .overlay{
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, var(--marble-soft), var(--marble));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .overlay.hidden{ display: none; }

  .overlay-inner{
    text-align: center;
    max-width: 480px;
  }

  .loading-state.hidden, .reveal-state.hidden{ display:none; }

  .spin-shards{
    display:flex;
    justify-content:center;
    gap: 14px;
    margin-bottom: 26px;
  }
  .mini-shard{
    width: 34px; height: 34px;
    background: var(--terracotta);
    clip-path: polygon(10% 0%, 90% 8%, 100% 60%, 70% 100%, 10% 90%, 0% 40%);
    animation: tumble 1.1s ease-in-out infinite;
  }
  .mini-shard:nth-child(2){ animation-delay: 0.15s; background: var(--terracotta-light); }
  .mini-shard:nth-child(3){ animation-delay: 0.3s; background: var(--terracotta-dark); }
  .mini-shard:nth-child(4){ animation-delay: 0.45s; background: var(--terracotta); }
  @keyframes tumble{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-16px) rotate(180deg); }
  }
  .loading-text{
    font-family: var(--font-display);
    color: var(--gold-soft);
    font-size: 17px;
    letter-spacing: 0.06em;
  }

  .reveal-eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--terracotta-light);
    margin: 0 0 14px;
  }
  .reveal-name{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(32px, 9vw, 54px);
    color: var(--gold);
    margin: 0 0 18px;
    text-shadow: 0 0 30px rgba(201,162,39,0.35);
    word-break: keep-all;
  }
  .reveal-meta{
    font-family: var(--font-mono);
    font-size: 14px;
    color: #E7DAC0;
    margin: 0 0 18px;
  }
  .reveal-flavor{
    font-size: 16px;
    color: #CDBE9C;
    margin: 0 0 24px;
    line-height: 1.7;
  }

  .reveal-reasons{
    text-align: left;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(228,199,102,0.25);
    border-radius: 6px;
    padding: 16px 20px;
    margin: 0 0 26px;
    max-height: 220px;
    overflow-y: auto;
  }
  .reveal-reasons.hidden{ display:none; }
  .reveal-reasons-group + .reveal-reasons-group{ margin-top: 14px; }
  .reveal-reasons-name{
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--gold-soft);
    margin: 0 0 8px;
  }
  .reveal-reasons-list{
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .reveal-reasons-list li{
    font-size: 14px;
    color: #E7DAC0;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(228,199,102,0.18);
    line-height: 1.5;
  }
  .reveal-reasons-list li:last-child{ border-bottom: none; }
  .reveal-reasons-empty{
    font-size: 13px;
    color: #B6A77F;
    font-style: italic;
  }

  /* ---------- 토스트 ---------- */
  .toast{
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--clay);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    box-shadow: 0 10px 24px var(--shadow);
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 200;
  }
  .toast.hidden{ visibility: hidden; }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .leader-btn{
    margin-top: 12px;
    display: block;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  /* ─── 라이브 순위 ─── */
  .live-state{ text-align:left; }
  .live-list{ display:flex; flex-direction:column; gap:10px; margin:16px 0; max-height:55vh; overflow-y:auto; padding-right:4px; }
  .live-item{ background:rgba(255,255,255,0.07); border:1px solid rgba(201,162,39,0.2); border-radius:4px; padding:12px 14px; }
  .live-item--top{ border-color:var(--gold); background:rgba(201,162,39,0.1); }
  .live-rank{ font-family:var(--font-mono); font-size:11px; color:var(--terracotta-light); margin-bottom:4px; }
  .live-name{ font-family:var(--font-display); font-size:20px; color:var(--gold-soft); font-weight:700; }
  .live-item--top .live-name{ color:var(--gold); }
  .live-count{ font-family:var(--font-mono); font-size:13px; color:#CDBE9C; margin-top:2px; }
  .live-reasons{ margin:6px 0 0 0; padding-left:16px; }
  .live-reasons li{ font-size:13px; color:#B8A888; margin:2px 0; }
  .live-total{ font-family:var(--font-mono); font-size:12px; color:#9A8A68; text-align:right; margin:0; }
  .live-empty{ color:#CDBE9C; font-size:16px; line-height:1.7; text-align:center; padding:30px 0; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="hero">
    <p class="eyebrow">Ostrakismos · 시민의 표결</p>

    <div class="cta-row">
      <button id="participateBtn" class="btn btn-primary">참여하기</button>
    </div>
    <p class="countdown" id="countdown"></p>
  </header>

  <div class="results-btn-wrap" id="resultsButtonWrap"></div>

  <main class="main-grid">
    <section class="voting-area hidden" id="votingArea">
      <div class="vote-card">
        <div class="field-block">
          <label for="nameInput">추방하고 싶은 사람의 이름</label>

            <defs>
              <clipPath id="kraterClip">
                <path d="M40,20 C40,10 160,10 160,20 L150,30 C170,40 175,90 150,120 C175,150 170,190 130,210 L130,225 C130,232 70,232 70,225 L70,210 C30,190 25,150 50,120 C25,90 30,40 50,30 Z"/>
              </clipPath>
            </defs>
            <path d="M40,60 C15,60 15,110 40,105" fill="none" stroke="#211912" stroke-width="9" stroke-linecap="round"/>
            <path d="M160,60 C185,60 185,110 160,105" fill="none" stroke="#211912" stroke-width="9" stroke-linecap="round"/>
            <path d="M40,20 C40,10 160,10 160,20 L150,30 C170,40 175,90 150,120 C175,150 170,190 130,210 L130,225 C130,232 70,232 70,225 L70,210 C30,190 25,150 50,120 C25,90 30,40 50,30 Z" fill="#211912" stroke="#BB5A35" stroke-width="2"/>
            <g clip-path="url(#kraterClip)">

    <aside class="history-panel">
      <h2>추방의 역사</h2>
      <p class="history-sub">매주 금요일 오후 4시 기록</p>
      <div class="meander-mini meander light"></div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">아직 추방된 자가 없습니다.</li>
      </ul>
    </aside>
  </main>

  <p class="footnote">이 표결은 2026년 8월 31일까지 매주 이어집니다.</p>
</div>

<div class="overlay hidden" id="resultsOverlay">
  <div class="overlay-inner">
    <div class="loading-state hidden" id="loadingState">
      <div class="spin-shards">
        <div class="mini-shard"></div><div class="mini-shard"></div><div class="mini-shard"></div><div class="mini-shard"></div>
      </div>
      <p class="loading-text">운명의 저울이 움직이고 있습니다…</p>
    </div>
    <div class="reveal-state hidden" id="revealState">
      <p class="reveal-eyebrow">이번의 판결</p>
      <h2 class="reveal-name" id="revealName"></h2>
      <p class="reveal-meta" id="revealMeta"></p>
      <p class="reveal-flavor" id="revealFlavor"></p>

    </div>
    <div class="live-state hidden" id="liveState">
      <p class="reveal-eyebrow">⚡ 이번 주 현재 순위</p>
      <div id="liveContent"></div>
      <button class="btn btn-gold" style="margin-top:22px" onclick="document.getElementById('resultsOverlay').classList.add('hidden')">닫기</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
(function(){
  "use strict";

  // ★ 테스트 모드: 매일 오늘 16시 마감
  //   실제 주간 모드로 바꾸려면 useDailyMode = false 로 변경
  var USE_DAILY_MODE = true;
  var DEADLINE_HOUR  = 15;
  var RESULT_WINDOW_HOURS = 8;   // 마감 후 몇 시간까지 결과 버튼 표시 (daily)
  // 주간 모드에서는 56시간 (금요일 16시 → 월요일 0시)

  var FULL_VOTES_FOR_FILL = 20;
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwpHFKV5EmL9oQUThpr0WGLD9H5JPmjKu5P97CmJtcJ4jQ3kBy79pj39ev5juHd8N6K/exec';

  function pad(n){ return String(n).padStart(2,'0'); }
  function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function formatKorDate(key){
    var p = key.split('-');
    return parseInt(p[1],10)+'월 '+parseInt(p[2],10)+'일';
  }

  // ─── 주차 계산 ─────────────────────────────────────────────
  // 공통: period key = 마감일(YYYY-MM-DD), 마감 시각 = 그날 16:00
  function getPeriods(now){
    var deadline, prevDeadline;

    if(USE_DAILY_MODE){
      // 매일 16시 마감
      var todayDl = new Date(now.getFullYear(), now.getMonth(), now.getDate(), DEADLINE_HOUR,0,0,0);
      if(now.getTime() >= todayDl.getTime()){
        deadline     = new Date(todayDl.getTime() + 24*3600*1000); // 내일 마감
        prevDeadline = todayDl;                                      // 오늘이 가장 최근 마감
      } else {
        deadline     = todayDl;                                      // 오늘 마감
        prevDeadline = new Date(todayDl.getTime() - 24*3600*1000);  // 어제가 가장 최근 마감
      }
      var resultWindowHours = RESULT_WINDOW_HOURS;
    } else {
      // 매주 금요일 16시 마감
      var day = now.getDay();
      var diffToFri = (5 - day + 7) % 7;
      var thisFri = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diffToFri, DEADLINE_HOUR,0,0,0);
      if(now.getTime() >= thisFri.getTime()){
        deadline     = new Date(thisFri.getTime() + 7*24*3600*1000);
        prevDeadline = thisFri;
      } else {
        deadline     = thisFri;
        prevDeadline = new Date(thisFri.getTime() - 7*24*3600*1000);
      }
      var resultWindowHours = 56; // 금 16:00 → 월 00:00
    }

    var resultWindowEnd = new Date(prevDeadline.getTime() + resultWindowHours*3600*1000);
    var inResultWindow  = now.getTime() >= prevDeadline.getTime() &&
                          now.getTime() <  resultWindowEnd.getTime();

    return {
      currentPeriodKey: dateKey(deadline),    // 지금 투표 쌓이는 주차
      currentDeadline:  deadline,
      recentPeriodKey:  dateKey(prevDeadline), // 가장 최근 마감 주차
      resultWindowEnd:  resultWindowEnd,
      inResultWindow:   inResultWindow         // ★ 결과 공개 기간인지 여부
    };
  }

  // ─── API 호출 ──────────────────────────────────────────────
  async function apiGet(qs){
    try{
      var r = await fetch(APPS_SCRIPT_URL+'?'+qs, { method:'GET' });
      if(!r.ok){ console.error('apiGet HTTP', r.status); return null; }
      return await r.json();
    }catch(e){ console.error('apiGet error', e); return null; }
  }

  async function apiPost(payload){
    try{
      var r = await fetch(APPS_SCRIPT_URL, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      if(!r.ok){ console.error('apiPost HTTP', r.status); return null; }
      return await r.json();
    }catch(e){ console.error('apiPost error', e); return null; }
  }

  // ─── 투표 API ──────────────────────────────────────────────
  async function getVoteEntries(periodKey){
    var data = await apiGet('action=votes&period='+encodeURIComponent(periodKey));
    if(!Array.isArray(data)) return [];
    return data.map(function(item){
      if(typeof item === 'string') return { name: item, reason: '' };
      return { name: (item.name || '').toString().trim(), reason: (item.reason || '').toString().trim() };
    });
  }

  async function addVote(periodKey, name, reason){
    var res = await apiPost({ action:'vote', period:periodKey, name:name, reason:reason||'' });
    return !!(res && res.ok);
  }

  async function loadHistory(){
    var data = await apiGet('action=history');
    if(!data || typeof data !== 'object' || Array.isArray(data)) return {};
    Object.keys(data).forEach(function(k){
      var e = data[k];
      if(!e.winners) e.winners = [];
      if(!e.reasons) e.reasons = {};
    });
    return data;
  }

  async function saveHistoryEntry(periodKey, entry){
    await apiPost({
      action:'saveResult', period:periodKey,
      winners:   entry.winners,
      count:     entry.count,
      total:     entry.total,
      computedAt:entry.computedAt,
      reasons:   entry.reasons || {}
    });
  }

  // ─── 집계 ──────────────────────────────────────────────────
  function tally(entries){
    var counts = {}, reasonsMap = {};
    entries.forEach(function(e){
      var name = (e.name||'').trim(); if(!name) return;
      counts[name] = (counts[name]||0) + 1;
      var r = (e.reason||'').trim();
      if(r){ if(!reasonsMap[name]) reasonsMap[name]=[]; reasonsMap[name].push(r); }
    });
    var max=0, winners=[];
    Object.keys(counts).forEach(function(n){
      var c=counts[n];
      if(c>max){ max=c; winners=[n]; } else if(c===max&&max>0){ winners.push(n); }
    });
    var winnerReasons={};
    winners.forEach(function(n){ winnerReasons[n]=reasonsMap[n]||[]; });
    return { counts:counts, max:max, winners:winners, total:entries.length, winnerReasons:winnerReasons, reasonsMap:reasonsMap };
  }

  async function computeResults(periodKey){
    var entries = await getVoteEntries(periodKey);
    var t = tally(entries);
    var entry = { winners:t.winners, count:t.max, total:t.total, computedAt:Date.now(), reasons:t.winnerReasons };
    await saveHistoryEntry(periodKey, entry);
    return entry;
  }

  // ─── DOM refs ──────────────────────────────────────────────
  var participateBtn    = document.getElementById('participateBtn');
  var votingArea        = document.getElementById('votingArea');
  var nameInput         = document.getElementById('nameInput');
  var reasonInput       = document.getElementById('reasonInput');
  var engraveBtn        = document.getElementById('engraveBtn');
  var shardWrap         = document.getElementById('shardWrap');
  var shardText         = document.getElementById('shardText');
  var shardReasonEl     = document.getElementById('shardReason');
  var dropBtn           = document.getElementById('dropBtn');
  var kraterFill        = document.getElementById('kraterFill');
  var kraterWrap        = document.getElementById('kraterWrap');
  var historyList       = document.getElementById('historyList');
  var resultsButtonWrap = document.getElementById('resultsButtonWrap');
  var countdownEl       = document.getElementById('countdown');
  var overlay           = document.getElementById('resultsOverlay');
  var loadingState      = document.getElementById('loadingState');
  var revealState       = document.getElementById('revealState');
  var liveState         = document.getElementById('liveState');
  var revealName        = document.getElementById('revealName');
  var revealMeta        = document.getElementById('revealMeta');
  var revealFlavor      = document.getElementById('revealFlavor');
  var revealReasonsEl   = document.getElementById('revealReasons');
  var liveContentEl     = document.getElementById('liveContent');
  var closeOverlayBtn   = document.getElementById('closeOverlayBtn');
  var toast             = document.getElementById('toast');

  var state = {
    periods: null, history: {},
    currentName: '', currentReason: '', voteCount: 0
  };

  function showToast(msg, dur){
    toast.textContent = msg;
    toast.classList.remove('hidden');
    requestAnimationFrame(function(){ toast.classList.add('show'); });
    setTimeout(function(){
      toast.classList.remove('show');
      setTimeout(function(){ toast.classList.add('hidden'); }, 320);
    }, dur||1900);
  }
  function delay(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
  function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // ─── 참여 흐름 ─────────────────────────────────────────────
  participateBtn.addEventListener('click', function(){
    votingArea.classList.remove('hidden');
    participateBtn.style.display = 'none';
    votingArea.scrollIntoView({ behavior:'smooth', block:'start' });
    nameInput.focus();
  });

  engraveBtn.addEventListener('click', function(){
    var name = nameInput.value.trim();
    if(!name){ showToast('이름을 적어주세요.'); nameInput.focus(); return; }
    state.currentName   = name;
    state.currentReason = reasonInput.value.trim();
    nameInput.disabled = reasonInput.disabled = engraveBtn.disabled = true;

    shardText.innerHTML = '';
    Array.from(name).forEach(function(ch, i){
      var sp = document.createElement('span');
      sp.textContent = ch;
      sp.style.animationDelay = (i*70)+'ms';
      shardText.appendChild(sp);
    });
    if(state.currentReason){
      shardReasonEl.textContent = '"'+state.currentReason+'"';
      shardReasonEl.classList.remove('hidden');
    } else {
      shardReasonEl.textContent = '';
      shardReasonEl.classList.add('hidden');
    }
    shardWrap.classList.remove('hidden');
    document.getElementById('shard').classList.remove('dropping');
  });

  dropBtn.addEventListener('click', function(){
    var shard = document.getElementById('shard');
    shard.classList.add('dropping');
    setTimeout(async function(){
      showToast('저장 중…', 4000);
      var ok = await addVote(state.periods.currentPeriodKey, state.currentName, state.currentReason);
      if(ok){
        state.voteCount += 1;
        updateKraterFill(state.voteCount);
        pulseKrater();
        showToast('도편이 바구니에 담겼습니다!');
      } else {
        showToast('⚠️ 저장 실패. 인터넷 연결을 확인해주세요.', 3000);
      }
      shard.classList.remove('dropping');
      shardWrap.classList.add('hidden');
      shardText.innerHTML = '';
      shardReasonEl.textContent = '';
      shardReasonEl.classList.add('hidden');
      nameInput.value = reasonInput.value = '';
      nameInput.disabled = reasonInput.disabled = engraveBtn.disabled = false;
      nameInput.focus();
    }, 720);
  });

  function pulseKrater(){
    kraterWrap.classList.add('pulse');
    setTimeout(function(){ kraterWrap.classList.remove('pulse'); }, 450);
  }
  function updateKraterFill(c){
    var h = Math.min(c/FULL_VOTES_FOR_FILL,1)*200;
    kraterFill.setAttribute('height', h);
    kraterFill.setAttribute('y', 240-h);
  }

  // ─── 역사 패널 ─────────────────────────────────────────────
  function renderHistory(hist){
    var keys = Object.keys(hist).sort().reverse();
    historyList.innerHTML = '';
    if(!keys.length){ historyList.innerHTML = '<li class="history-empty">아직 추방된 자가 없습니다.</li>'; return; }
    keys.forEach(function(k){
      var e = hist[k];
      var li = document.createElement('li'); li.className = 'history-item';
      var wstr = (!e.winners||!e.winners.length) ? '추방자 없음' :
                 e.winners.length===1 ? e.winners[0] :
                 e.winners.join(' · ')+' (공동 추방)';
      var cstr = (!e.winners||!e.winners.length) ? '투표 0건' :
                 e.winners.length===1 ? e.count+'표 · 총 '+e.total+'표' :
                 '각 '+e.count+'표 동률 · 총 '+e.total+'표';
      li.innerHTML =
        '<div class="history-date">'+formatKorDate(k)+' 결과</div>'+
        '<div class="history-winner">'+esc(wstr)+'</div>'+
        '<div class="history-count">'+cstr+'</div>';
      historyList.appendChild(li);
    });
  }

  // ─── 결과 버튼 / 상태 메시지 ───────────────────────────────
  async function refreshResultsArea(){
    var p = state.periods;
    var html = '';

    if(p.inResultWindow){
      var key  = p.recentPeriodKey;
      var icon = state.history[key] ? '📜' : '⚖️';
      var lbl  = state.history[key] ? '결과 다시 보기' : '결과 보기';
      html += '<button class="results-pill" id="viewResultBtn">'+icon+' '+formatKorDate(key)+' '+lbl+'</button> ';
    } else {
      var nextStr = USE_DAILY_MODE
        ? '오늘 오후 4시'
        : formatKorDate(p.currentPeriodKey)+' 금요일 오후 4시';
      html += '<span class="status-message">⏳ 결과를 기다리는 중 — 발표 시각: '+nextStr+'</span>';
    }

    // 항상 표시: 현재 1등 보기 버튼
    html += '<button class="btn btn-ghost leader-btn" id="liveLeaderBtn">⚡ 지금 1등 확인</button>';

    resultsButtonWrap.innerHTML = html;

    var viewBtn = document.getElementById('viewResultBtn');
    if(viewBtn){
      viewBtn.addEventListener('click', function(){
        openFinalOverlay(p.recentPeriodKey);
      });
    }
    document.getElementById('liveLeaderBtn').addEventListener('click', openLiveOverlay);
  }

  // ─── 오버레이: 최종 결과 ───────────────────────────────────
  function showOverlayState(which){
    loadingState.classList.add('hidden');
    revealState.classList.add('hidden');
    liveState.classList.add('hidden');
    document.getElementById(which).classList.remove('hidden');
  }

  async function openFinalOverlay(periodKey){
    overlay.classList.remove('hidden');
    showOverlayState('loadingState');

    var fresh = !state.history[periodKey];
    var entryP = fresh ? computeResults(periodKey) : Promise.resolve(state.history[periodKey]);
    var entry  = await Promise.all([entryP, delay(2400)]).then(function(r){ return r[0]; });
    if(!entry){ showToast('⚠️ 결과를 불러오지 못했습니다.', 3000); overlay.classList.add('hidden'); return; }
    if(fresh) state.history[periodKey] = entry;

    showOverlayState('revealState');

    if(!entry.winners||!entry.winners.length){
      revealName.textContent    = '추방자 없음';
      revealMeta.textContent    = '도편이 한 장도 들어오지 않았습니다.';
      revealFlavor.textContent  = '아고라는 조용했다.';
    } else if(entry.winners.length===1){
      revealName.textContent    = entry.winners[0];
      revealMeta.textContent    = entry.count+'표 · 총 '+entry.total+'표 중';
      revealFlavor.textContent  = entry.winners[0]+'은(는) 아고라에서 추방되었다.';
    } else {
      revealName.textContent    = entry.winners.join(' & ');
      revealMeta.textContent    = '각 '+entry.count+'표 동률 · 총 '+entry.total+'표 중';
      revealFlavor.textContent  = '이번 주는 함께 추방되었다.';
    }

    renderRevealReasons(entry.winners, entry.reasons||{});
    renderHistory(state.history);
    refreshResultsArea();
  }

  // ─── 오버레이: 현재 1등(라이브) ────────────────────────────
  async function openLiveOverlay(){
    overlay.classList.remove('hidden');
    liveContentEl.innerHTML = '<p class="loading-text">집계 중…</p>';
    showOverlayState('liveState');

    var entries = await getVoteEntries(state.periods.currentPeriodKey);
    if(!entries.length){
      liveContentEl.innerHTML = '<p class="live-empty">아직 투표가 없습니다.<br>첫 번째 도편을 넣어보세요!</p>';
      return;
    }

    var t = tally(entries);
    // 순위별로 정렬
    var sorted = Object.keys(t.counts).sort(function(a,b){ return t.counts[b]-t.counts[a]; });
    var html = '<div class="live-list">';
    sorted.forEach(function(name, idx){
      var cnt   = t.counts[name];
      var isTop = (cnt === t.max);
      var reasons = t.reasonsMap[name] || [];
      html += '<div class="live-item'+(isTop?' live-item--top':'')+'">';
      html += '<div class="live-rank">#'+(idx+1)+'</div>';
      html += '<div class="live-name">'+esc(name)+'</div>';
      html += '<div class="live-count">'+cnt+'표</div>';
      if(reasons.length){
        html += '<ul class="live-reasons">';
        reasons.forEach(function(r){ html += '<li>'+esc(r)+'</li>'; });
        html += '</ul>';
      }
      html += '</div>';
    });
    html += '</div>';
    html += '<p class="live-total">총 '+entries.length+'표 · '+sorted.length+'명</p>';
    liveContentEl.innerHTML = html;
  }

  function renderRevealReasons(winners, reasonsMap){
    if(!winners||!winners.length){ revealReasonsEl.classList.add('hidden'); return; }
    var html = '';
    winners.forEach(function(name){
      var list = reasonsMap[name]||[];
      html += '<div class="reveal-reasons-group">';
      html += '<p class="reveal-reasons-name">'+esc(name)+'의 사유</p>';
      if(!list.length){
        html += '<p class="reveal-reasons-empty">전달된 사유가 없습니다.</p>';
      } else {
        html += '<ul class="reveal-reasons-list">';
        list.forEach(function(r){ html += '<li>'+esc(r)+'</li>'; });
        html += '</ul>';
      }
      html += '</div>';
    });
    revealReasonsEl.innerHTML = html;
    revealReasonsEl.classList.remove('hidden');
  }

  closeOverlayBtn.addEventListener('click', function(){ overlay.classList.add('hidden'); });

  // ─── 카운트다운 ────────────────────────────────────────────
  function tickCountdown(){
    var now  = new Date();
    var diff = state.periods.currentDeadline - now;
    if(diff <= 0){ countdownEl.textContent = '곧 결과가 발표됩니다…'; return; }
    var tm = Math.floor(diff/60000);
    var d  = Math.floor(tm/(60*24));
    var h  = Math.floor((tm%(60*24))/60);
    var m  = tm%60;
    var msg = USE_DAILY_MODE
      ? '오늘 마감까지 '+h+'시간 '+m+'분 남음'
      : '다음 추방까지 '+d+'일 '+h+'시간 '+m+'분 남음';
    countdownEl.textContent = msg;
  }

  // ─── 초기화 ────────────────────────────────────────────────
  async function init(){
    state.periods = getPeriods(new Date());
    state.history = await loadHistory();
    renderHistory(state.history);
    var entries = await getVoteEntries(state.periods.currentPeriodKey);
    state.voteCount = entries.length;
    updateKraterFill(state.voteCount);
    await refreshResultsArea();
    tickCountdown();
    setInterval(function(){
      state.periods = getPeriods(new Date());
      tickCountdown();
      refreshResultsArea();
    }, 30000);
  }

  init();
})();
</script>

</body>
